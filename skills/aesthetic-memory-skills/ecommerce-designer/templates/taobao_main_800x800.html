<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1747 主图 800x800</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Sans SC", sans-serif; }
        
        .main-image {
            width: 800px;
            height: 800px;
            position: relative;
            background: linear-gradient(135deg, #F5E6D3 0%, #E8D4C4 50%, #D4C4B0 100%);
            overflow: hidden;
        }
        
        /* 模特主体 - 占据大部分画面 */
        .model-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .model-img {
            height: 95%;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.15));
        }
        
        /* 顶部品牌 */
        .brand {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 20px;
            font-weight: 800;
            color: #3D2914;
            letter-spacing: 6px;
            z-index: 10;
        }
        
        /* 促销标签 - 右上角 */
        .promo-badge {
            position: absolute;
            top: 30px;
            right: 30px;
            background: linear-gradient(135deg, #FF1744 0%, #FF6B35 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 24px;
            font-weight: 900;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(255,23,68,0.3);
        }
        
        /* 底部信息 */
        .bottom-info {
            position: absolute;
            bottom: 40px;
            left: 30px;
            right: 30px;
            z-index: 10;
        }
        
        .title {
            font-size: 42px;
            font-weight: 900;
            color: #3D2914;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.5);
        }
        
        .subtitle {
            font-size: 20px;
            color: #6B4423;
            font-weight: 500;
        }
        
        /* 装饰 */
        .deco-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }
        .c1 { width: 200px; height: 200px; top: -50px; right: -50px; }
        .c2 { width: 150px; height: 150px; bottom: 150px; left: -50px; }
    </style>
</head>
<body>
    <div class="main-image">
        <div class="deco-circle c1"></div>
        <div class="deco-circle c2"></div>
        
        <div class="brand">1747</div>
        
        <div class="promo-badge">全场8折</div>
        
        <div class="model-container">
            <img src="file:///root/.openclaw/workspace/model.jpg" class="model-img" alt="model">
        </div>
        
        <div class="bottom-info">
            <div class="title">元宵节·春季上新</div>
            <div class="subtitle">潮流新装 点亮新学期</div>
        </div>
    </div>
</body>
</html>
