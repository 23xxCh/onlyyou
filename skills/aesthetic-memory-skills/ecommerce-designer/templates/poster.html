<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }
        .poster {
            width: 100%;
            height: 100vh;
            background: {{theme_gradient}};
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 60px;
        }
        .title {
            font-size: 72px;
            font-weight: 900;
            color: {{theme_text}};
            margin-bottom: 24px;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }
        .subtitle {
            font-size: 32px;
            color: {{theme_text2}};
            margin-bottom: 48px;
            font-weight: 400;
        }
        .discount {
            display: inline-block;
            background: {{theme_accent}};
            color: #fff;
            padding: 20px 60px;
            border-radius: 100px;
            font-size: 36px;
            font-weight: bold;
            box-shadow: 0 8px 32px {{theme_accent}}80;
        }
        .decor-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
        }
        .c1 {
            width: 300px;
            height: 300px;
            background: {{theme_accent2}};
            top: -100px;
            right: -100px;
        }
        .c2 {
            width: 200px;
            height: 200px;
            background: {{theme_accent}};
            bottom: -50px;
            left: -50px;
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="decor-circle c1"></div>
        <div class="decor-circle c2"></div>
        <h1 class="title">{{title}}</h1>
        <p class="subtitle">{{subtitle}}</p>
        <span class="discount">{{discount}}</span>
    </div>
</body>
</html>
