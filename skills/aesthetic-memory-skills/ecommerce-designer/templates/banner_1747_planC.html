<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1747 方案C - 创意融合</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Noto Sans SC", sans-serif; }
        
        .banner {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            background: #F5E6D3;
        }
        
        /* 背景模特图 - 半透明叠加 */
        .bg-model {
            position: absolute;
            right: -5%;
            top: 50%;
            transform: translateY(-50%);
            height: 110%;
            opacity: 0.25;
            filter: grayscale(30%) blur(1px);
        }
        
        /* 主模特图 */
        .main-model {
            position: absolute;
            right: 8%;
            bottom: 0;
            height: 95%;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.2));
            z-index: 2;
        }
        
        /* 左侧卡片 */
        .card {
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            width: 480px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 45px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            z-index: 3;
        }
        
        .brand {
            font-size: 20px;
            font-weight: 800;
            color: #8B7355;
            letter-spacing: 8px;
            margin-bottom: 20px;
        }
        
        .main-title {
            font-size: 56px;
            font-weight: 900;
            color: #3D2914;
            line-height: 1.2;
            margin-bottom: 12px;
        }
        
        .subtitle {
            font-size: 22px;
            color: #6B4423;
            margin-bottom: 35px;
        }
        
        .discount-box {
            background: linear-gradient(135deg, #C44569 0%, #FF6B9D 100%);
            padding: 18px 40px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 8px 25px rgba(196,69,105,0.3);
        }
        
        .discount-text {
            font-size: 36px;
            font-weight: 900;
            color: #fff;
        }
        
        .discount-sub {
            font-size: 16px;
            color: rgba(255,255,255,0.9);
        }
        
        .date {
            margin-top: 25px;
            font-size: 14px;
            color: #8B7355;
        }
        
        /* 装饰 */
        .blob {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(196,69,105,0.15), rgba(255,107,157,0.1));
        }
        .b1 { width: 500px; height: 500px; top: -200px; left: -200px; }
        .b2 { width: 350px; height: 350px; bottom: -100px; right: 20%; }
    </style>
</head>

        <div class="blob b1"></div>
        <div class="blob b2"></div>
